name: Build and Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
      - 'skills/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Package
        run: npm pack

      - name: Extract version
        id: version
        run: echo "version=$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

      - name: Extract changelog
        id: changelog
        run: |
          version="${{ steps.version.outputs.version }}"
          changelog=$(awk "/\[$version\]/{found=1; next} /\[.*\]/{found=0} found && NF" CHANGELOG.md)
          {
            echo "body<<EOF"
            echo "$changelog"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create or Update Git Tag
        run: |
          version="${{ steps.version.outputs.version }}"
          tag="v${version}"
          if git tag -l "$tag" | grep -q .; then
            git tag -f "$tag"
            git push -f origin "$tag"
          else
            git tag "$tag"
            git push origin "$tag"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          files: nvidia-nim-mcp-*.tgz
